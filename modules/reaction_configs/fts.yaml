name: Fischer-Tropsch Synthesis (FTS)
description: CO + H2 → hydrocarbons + H2O
reactant: CO
internal_standard: Ar

inlet_species:
  - label: CO
    default_sccm: 10
  - label: H2
    default_sccm: 20
  - label: Ar
    default_sccm: 15

species:
  # TCD
  Hydrogen:              { label: H2,        cn: 0, det: TCD }
  Carbon Dioxide:        { label: CO2,       cn: 1, det: TCD }
  Ar/O2:                 { label: Ar,        cn: 0, det: TCD }
  Carbon Monoxide:       { label: CO,        cn: 1, det: TCD }
  Nitrogen:              { label: N2,        cn: 0, det: TCD }
  Methane TCD:           { label: CH4_TCD,   cn: 1, det: TCD }
  Ethane TCD:            { label: C2H6_TCD,  cn: 2, det: TCD }
  Ethylene TCD:          { label: C2H4_TCD,  cn: 2, det: TCD }
  # FID
  Methane FID:           { label: CH4,       cn: 1, det: FID }
  Ethane FID:            { label: C2H6,      cn: 2, det: FID }
  Ethylene FID:          { label: C2H4,      cn: 2, det: FID }
  Propane:               { label: C3H8,      cn: 3, det: FID }
  Propylene:             { label: C3H6,      cn: 3, det: FID }
  1-3-butadiene:         { label: C4H6,      cn: 4, det: FID }
  Trans-2-Butene:        { label: t2C4H8,    cn: 4, det: FID }
  1-Butene:              { label: 1C4H8,     cn: 4, det: FID }
  Cis-2-butene:          { label: c2C4H8,    cn: 4, det: FID }
  Butane:                { label: nC4H10,    cn: 4, det: FID }
  Isobutane:             { label: iC4H10,    cn: 4, det: FID }
  iso-butylene:          { label: iC4H8,     cn: 4, det: FID }
  Pentane:               { label: nC5H12,    cn: 5, det: FID }
  iso-pentane:           { label: iC5H12,    cn: 5, det: FID }
  Hexane:                { label: C6H14,     cn: 6, det: FID }
  Propadiene:            { label: C3H4,      cn: 3, det: FID }
  4-Vinyl-1-Cyclohexene: { label: VCH,       cn: 8, det: FID }
