# CUSTOM REACTION CONFIGURATION TEMPLATE
# ----------------------------------------
# Copy this file, rename it (e.g. my_reaction.yaml), and fill in your details.
# The app will automatically detect it in the dropdown on next launch.
#
# Rules:
#   - label:  short name used in plots and output columns
#   - cn:     carbon number (0 for non-carbon species like H2, O2, Ar, N2)
#   - det:    TCD or FID
#   - The key (left side) must exactly match the column header in your GC file

name: My Custom Reaction
description: Brief description of your reaction
reactant: CO          # label of your reactant (must match a label below)
internal_standard: Ar # label of your Ar/IS channel

inlet_species:
  - label: CO
    default_sccm: 10
  - label: H2
    default_sccm: 20
  - label: Ar
    default_sccm: 15

species:
  # --- TCD species ---
  Hydrogen:         { label: H2,   cn: 0, det: TCD }
  Carbon Dioxide:   { label: CO2,  cn: 1, det: TCD }
  Ar/O2:            { label: Ar,   cn: 0, det: TCD }
  Carbon Monoxide:  { label: CO,   cn: 1, det: TCD }
  Nitrogen:         { label: N2,   cn: 0, det: TCD }

  # --- FID species (add as needed) ---
  Methane FID:      { label: CH4,  cn: 1, det: FID }
  Ethane FID:       { label: C2H6, cn: 2, det: FID }
  Ethylene FID:     { label: C2H4, cn: 2, det: FID }
  # Add more rows following the same pattern...
